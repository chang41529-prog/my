<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP Archive by lphang</title>
  <meta name="description" content="개인 LP 아카이브 사이트" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">LP ARCHIVE</p>
        <h1>lphang LP Archive</h1>
        <p class="hero-copy">
          보유 중인 LP를 검색하고, 추가하고, 수정하고, 내보낼 수 있는 개인 아카이브입니다.
          GitHub Pages에 바로 올려 사용할 수 있도록 정적 사이트로 제작했습니다.
        </p>
      </div>
      <div class="hero-badge">
        <span>Records</span>
        <strong id="albumCount">0</strong>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <section>
          <h2>검색 / 정렬</h2>
          <div class="field">
            <label for="searchInput">검색</label>
            <input id="searchInput" type="text" placeholder="앨범, 아티스트, 장르, 곡 검색" />
          </div>
          <div class="field">
            <label for="genreFilter">장르 필터</label>
            <select id="genreFilter">
              <option value="all">전체</option>
            </select>
          </div>
          <div class="field">
            <label for="sortSelect">정렬</label>
            <select id="sortSelect">
              <option value="title-asc">앨범명 ↑</option>
              <option value="title-desc">앨범명 ↓</option>
              <option value="artist-asc">아티스트 ↑</option>
              <option value="artist-desc">아티스트 ↓</option>
              <option value="year-desc">연도 최신순</option>
              <option value="year-asc">연도 오래된순</option>
              <option value="recent">최근 추가순</option>
            </select>
          </div>
          <button class="secondary" id="resetFiltersBtn">필터 초기화</button>
        </section>

        <section>
          <h2>데이터 관리</h2>
          <div class="button-stack">
            <button id="exportBtn">JSON 내보내기</button>
            <label class="upload-btn" for="importInput">JSON 불러오기</label>
            <input id="importInput" type="file" accept="application/json" hidden />
            <button class="secondary" id="seedBtn">기본 샘플 다시 불러오기</button>
            <button class="danger" id="clearBtn">전체 초기화</button>
          </div>
          <p class="hint">저장 데이터는 현재 브라우저의 로컬 저장소(localStorage)에 보관됩니다.</p>
        </section>
      </aside>

      <section class="content">
        <div class="panel form-panel">
          <div class="section-head">
            <h2 id="formTitle">새 LP 등록</h2>
            <button id="cancelEditBtn" class="ghost hidden">수정 취소</button>
          </div>
          <form id="albumForm">
            <div class="grid two-col">
              <div class="field">
                <label for="title">앨범 제목</label>
                <input id="title" name="title" required />
              </div>
              <div class="field">
                <label for="artist">아티스트</label>
                <input id="artist" name="artist" required />
              </div>
            </div>
            <div class="grid three-col">
              <div class="field">
                <label for="year">발매 연도</label>
                <input id="year" name="year" type="number" min="1900" max="2100" placeholder="예: 1976" />
              </div>
              <div class="field">
                <label for="genres">장르</label>
                <input id="genres" name="genres" placeholder="예: Jazz, Soul, Pop" />
              </div>
              <div class="field">
                <label for="format">포맷</label>
                <input id="format" name="format" placeholder="예: LP, 2LP, EP" />
              </div>
            </div>
            <div class="field">
              <label for="cover">커버 이미지 URL</label>
              <input id="cover" name="cover" type="url" placeholder="https://..." />
            </div>
            <div class="field">
              <label for="description">앨범 설명</label>
              <textarea id="description" name="description" rows="4" placeholder="간단한 소개나 감상을 적어주세요."></textarea>
            </div>
            <div class="field">
              <label for="tracks">트랙 목록</label>
              <textarea id="tracks" name="tracks" rows="5" placeholder="한 줄에 한 곡씩 입력&#10;예:&#10;1. Intro&#10;2. My Favorite Song"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" id="submitBtn">LP 저장</button>
            </div>
          </form>
        </div>

        <div class="panel list-panel">
          <div class="section-head">
            <h2>보유 LP 목록</h2>
            <p id="resultMeta">0개 표시됨</p>
          </div>
          <div id="emptyState" class="empty hidden">
            조건에 맞는 LP가 없습니다. 검색어나 필터를 조정해 주세요.
          </div>
          <div id="albumGrid" class="album-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="detailModal" class="modal">
    <div class="modal-card">
      <button class="modal-close" id="closeModalBtn" aria-label="닫기">×</button>
      <div id="modalBody"></div>
    </div>
  </dialog>

  <template id="albumCardTemplate">
    <article class="album-card">
      <button class="card-cover-btn" type="button">
        <img class="card-cover" alt="앨범 커버" />
      </button>
      <div class="card-body">
        <div class="card-main">
          <h3 class="card-title"></h3>
          <p class="card-artist"></p>
          <p class="card-meta"></p>
          <div class="tag-list"></div>
        </div>
        <div class="card-actions">
          <button class="ghost details-btn" type="button">상세보기</button>
          <button class="ghost edit-btn" type="button">수정</button>
          <button class="danger-outline delete-btn" type="button">삭제</button>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
